name: Haven
options:
  bundleIdPrefix: app.haven
  deploymentTarget:
    iOS: "17.0"
packages:
  HavenDesignSystem:
    path: ../HavenDesignSystem
  HavenCore:
    path: ../HavenCore
  convex-swift:
    url: https://github.com/get-convex/convex-swift
    from: 0.8.0
targets:
  Haven:
    type: application
    platform: iOS
    sources: [Sources, Haven.storekit]
    dependencies:
      - package: HavenDesignSystem
      - package: HavenCore
      - package: convex-swift
        product: ConvexMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.haven.Haven
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # No non-exempt encryption beyond Apple's exempt HTTPS — skips the per-build ASC question.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Haven warns you on high-risk weather days before a migraine."
        # convex-swift's Rust xcframework ships arm64-only for the simulator.
        # Exclude x86_64 so simulator builds link on Apple Silicon.
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
schemes:
  Haven:
    build:
      targets: { Haven: all }
    run:
      config: Debug
      storeKitConfiguration: Haven.storekit
