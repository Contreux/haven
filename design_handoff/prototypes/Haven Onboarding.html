<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haven — Onboarding & Paywall</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="haven-tokens.css?v=2" />
<link rel="stylesheet" href="haven-components.css?v=2" />
<link rel="stylesheet" href="haven-app.css?v=7" />
<link rel="stylesheet" href="onboarding.css?v=1" />
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--p-charcoal-950);overflow:hidden}
  #root{height:100%}
  .ob-phonewrap{transform-origin:center center}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/screens.jsx"></script>
<script type="text/babel" src="app/onboarding.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useLayoutEffect } = React;
const OB = window.Onboarding;
const SKEY = "haven.onboarding.v1";

/* short labels for the dev rail */
const Q_LABEL = {
  frequency: "Frequency", duration: "Duration", age: "Age", sex: "Sex",
  cycle: "Cycle", aura: "Aura", symptoms: "Symptoms", severity: "Severity",
  triggers: "Suspected triggers", meds: "Treatment", goal: "Goal",
};

function buildSteps(answers) {
  const vq = OB.Q.filter((q) => !q.requiresSex || q.requiresSex.includes(answers.sex));
  const qTotal = vq.length;
  const steps = [{ type: "welcome", label: "Welcome", group: "Intro" }];
  vq.forEach((q, i) => steps.push({ type: "q", q, qi: i, qTotal, label: Q_LABEL[q.id] || q.id, group: "Quiz" }));
  steps.push({ type: "synthesis", label: "Building profile", group: "Profile" });
  steps.push({ type: "perm-weather", label: "Weather access", group: "Permissions" });
  steps.push({ type: "perm-reminders", label: "Reminders", group: "Permissions" });
  steps.push({ type: "paywall", label: "Paywall", group: "Subscribe" });
  steps.push({ type: "done", label: "All set", group: "Subscribe" });
  return steps;
}

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem(SKEY)) || {}; } catch (e) { return {}; } })();
  const [i, setI] = useState(saved.i || 0);
  const [answers, setAnswers] = useState(saved.answers || {});
  const [plan, setPlan] = useState(saved.plan || "yearly");
  const [time, setTime] = useState(saved.time || "evening");
  const [trial, setTrial] = useState(saved.trial || false);

  const steps = buildSteps(answers);
  const idx = Math.min(i, steps.length - 1);
  const step = steps[idx];

  useEffect(() => {
    localStorage.setItem(SKEY, JSON.stringify({ i: idx, answers, plan, time, trial }));
  }, [idx, answers, plan, time, trial]);

  const go = (n) => setI(Math.max(0, Math.min(steps.length - 1, n)));
  const next = () => go(idx + 1);
  const back = () => go(idx - 1);
  const setA = (id, v) => setAnswers((a) => ({ ...a, [id]: v }));

  /* phone scaling — size the wrapper to the SCALED box so centering works */
  const fitRef = useRef(null);
  const phoneRef = useRef(null);
  useLayoutEffect(() => {
    const fit = () => {
      const availH = window.innerHeight - 44;
      const availW = window.innerWidth - 200 - 44;
      const s = Math.min(1, availH / 806, availW / 372);
      if (phoneRef.current) {
        phoneRef.current.style.transform = `scale(${s})`;
        phoneRef.current.style.transformOrigin = "top left";
      }
      if (fitRef.current) {
        fitRef.current.style.width = 372 * s + "px";
        fitRef.current.style.height = 806 * s + "px";
      }
    };
    fit();
    window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, []);

  const restart = () => { setAnswers({}); setPlan("yearly"); setTime("evening"); setTrial(false); setI(0); };

  /* ---- render current screen ---- */
  let screen = null;
  if (step.type === "welcome")
    screen = <OB.Welcome onStart={next} onSignIn={() => go(steps.length - 1)} />;
  else if (step.type === "q")
    screen = <OB.QuestionScreen q={step.q} value={answers[step.q.id]} setValue={(v) => setA(step.q.id, v)}
      segNow={step.qi} segTotal={step.qTotal} canBack={idx > 0} onBack={back} onNext={next} />;
  else if (step.type === "synthesis")
    screen = <OB.Synthesis answers={answers} onNext={next} onBack={back} />;
  else if (step.type === "perm-weather")
    screen = <OB.PermWeather onNext={next} onSkip={next} onBack={back} />;
  else if (step.type === "perm-reminders")
    screen = <OB.PermReminders time={time} setTime={setTime} onNext={next} onSkip={next} onBack={back} />;
  else if (step.type === "paywall")
    screen = <OB.Paywall plan={plan} setPlan={setPlan}
      onSubscribe={() => { setTrial(plan === "yearly"); next(); }} onClose={next} />;
  else if (step.type === "done")
    screen = <OB.Done trial={trial} onEnter={() => { window.location.href = "Haven App.html"; }} />;

  /* ---- dev rail ---- */
  let lastGroup = null;
  return (
    <>
      <div className="ob-rail">
        <h4>Onboarding flow</h4>
        {steps.map((s, n) => {
          const head = s.group !== lastGroup ? s.group : null;
          lastGroup = s.group;
          return (
            <React.Fragment key={n}>
              {head && <div className="rgroup" style={{ color: "var(--p-taupe-600)", fontSize: 10, fontWeight: 700, letterSpacing: ".12em", textTransform: "uppercase", margin: "14px 10px 6px" }}>{head}</div>}
              <button className={`rl ${n === idx ? "on" : ""}`} onClick={() => go(n)}>
                <span className="n">{String(n).padStart(2, "0")}</span>{s.label}
              </button>
            </React.Fragment>
          );
        })}
        <button className="restart" onClick={restart}>↺ Restart flow</button>
      </div>

      <div className="ob-stage">
        <div className="ob-fit" ref={fitRef} style={{ position: "relative" }}>
          <div className="phone theme-dark" ref={phoneRef} style={{ position: "absolute", top: 0, left: 0 }}>
            <div className="dyn" />
            <div className="screen">{screen}</div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
